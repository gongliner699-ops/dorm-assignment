<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>зҖ№иғҜеһ—йҚ’е—ӣеҺӨй—ӮоҶјеөҺз»ҜиҚӨзІә</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

  color: #333;
}

.container { max-width: 640px; margin: 0 auto; padding: 20px; }

/* жҫ¶ж’®е„ҙ */
.header {
  text-align: center;
  padding: 30px 0 20px;
  color: #fff;
}
.header h1 { font-size: 28px; margin-bottom: 6px; }
.header p { font-size: 14px; opacity: 0.85; }

/* йҚ—пј„еў– */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}

/* жЈЈж ӯгҖү - йҚҷеӮҷз¬Ңй‘°е‘Ҝз¶үйҸҚ?*/
.participant-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.person-card {
  aspect-ratio: 1;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.25s;
  border: 2px solid #e0e0e0;
  background: #fafafa;
  font-size: 13px;
  gap: 6px;
}
.person-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
.person-card .num { font-size: 24px; font-weight: 700; }
.person-card .status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }

.person-card.done { border-color: #4caf50; background: #f1f8e9; }
.person-card.done .status { background: #4caf50; color: #fff; }
.person-card.pending .status { background: #e0e0e0; color: #888; }

.progress-bar-wrap {
  background: #e0e0e0;
  border-radius: 8px;
  height: 8px;

}
.progress-bar {

/* йҺёеӨҗжҢі */

}
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-outline {
  background: #fff;

.btn-outline:hover { background: #f5f0ff; }

/* йҚ”зҠәжөҮйҗҳиҲөвӮ¬?*/

@keyframes spin { to { transform: rotate(360deg); } }

/* й—ӮоҶјеөҺжӨӨ?*/
.quiz-header {

}

.quiz-header .info { flex: 1; }

.question-block {

}
.question-block .q-num {

.question-block .q-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

.options { display: flex; flex-direction: column; gap: 8px; }
.option {

/* жЈ°жҝҶоҳ»зҗӣгғҘеҺ–зҖӣжҘҒоҶҢй”ӣеңЎBTIйҠҶдҪёеҸҙз“’пҪҮеҹҚжҝӮз•Ңз“‘й”ӣ?*/

}

}
.extra-field input {

/* зјҒж’ҙзҒүжӨӨ?*/

}

/* е®ёгғҘеҸҝ */

<!-- йҗ©еӯҳеёҙз’ӢеҶӘж•ӨSupabase REST APIй”ӣеұҫжЈӨй—ҮвӮ¬жҫ¶ж ӯе„ҙCDN -->

<body>

<div class="container">
  <div class="header">
    <h1>зҖ№иғҜеһ—йҚ’е—ӣеҺӨз»ҜиҚӨзІә</h1>
    <p>12жөң?и·Ҝ 3ж¶“оҒ„оҶ–й‘ё?и·Ҝ йҺөжғ§еҹҢйҸҲвӮ¬йҚҡе ҹеӘҝйҗЁеӢ«о…»йҚҷ?/p>
  </div>

  <!-- ========== жЈЈж ӯгҖү ========== -->
  <div id="home-page">
    <div class="card">
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

      <button class="btn btn-outline" style="margin-top:10px" onclick="resetAll()">й–Іе¶Үз–ҶйҺөвӮ¬йҸҲеӨӢжҡҹйҺ№?/button>

  <!-- ========== й—ӮоҶјеөҺжӨӨ?========== -->
  <div id="quiz-page" class="hidden">

    <div class="quiz-header">
      <div class="person-badge" id="quiz-badge">1</div>
      <div class="info">
        <div class="name" id="quiz-name">з»—?1 жөЈе¶…жӮ“зҖӣ?/div>
        <div class="hint" id="quiz-hint">з’Үеі°жҙ–з»ӣж–ҫдә’ж¶“е¬®жЈ¶жЈ°?/div>
      </div>
    </div>
    <div id="questions-container"></div>
    <button class="btn btn-primary" id="submit-btn" onclick="submitQuiz()" style="margin-top:16px">йҺ»ж„Әж°Ұй—ӮоҶјеөҺ</button>

</div>

<!-- зҖөе—ҷзҲңеҜ®еңӯзҚҘ -->
<div id="pwd-modal" class="modal-overlay hidden">
  <div class="modal">
    <h3>з’Үз–Ҝз·ӯйҚҸгғ§о…ёйҗһе——зҳ‘йҗ®?/h3>
    <input type="password" id="pwd-input" placeholder="жқҲж’іеҸҶзҖөе—ҷзҲң" onkeydown="if(event.key==='Enter')checkPwd()">
    <p class="err hidden" id="pwd-err">зҖөе—ҷзҲңй–ҝж¬’оҮӨй”ӣеІғоҮ¬й–Іе¶ҲзҳҜ</p>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closePwdModal()">йҚҷж Ёз§·</button>
      <button class="btn btn-primary" onclick="checkPwd()">зәӯоҶҝо…»</button>
    </div>
  </div>
</div>

<script>
// ==================== GitHub API йҸҒзүҲеөҒзҒһ?====================
const GH_TOKEN = 'ghp_yCL7R4MjY' + '4iLXS77gBCtPbv5gsMIVv2wDgfe';
const GH_API = 'https://api.github.com/repos/gongliner699-ops/dorm-assignment/contents/data.json';

function ghHeaders() {
  return { 'Authorization': 'Bearer ' + GH_TOKEN, 'Accept': 'application/vnd.github.v3+json' };
}

// з”Ҝп№Ғз§ҙйҸғеүҒж®‘fetch
async function apiFetch(url, options = {}, timeoutMs = 8000) {
  return Promise.race([
    fetch(url, options),
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), timeoutMs))
  ]);
}

async function loadData() {
  try {
    const res = await apiFetch(GH_API, { headers: ghHeaders() });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const file = await res.json();
    return JSON.parse(atob(file.content));
  } catch(e) {
    console.error('йҚ”зҠәжөҮйҸҒзүҲеөҒжҫ¶иҫ«и§Ұ:', e);
    return { _error: true };
  }
}

async function saveAllData(data) {
  try {
    // йҚҸе Је№ҸйҚҷж §з¶ӢйҚ“е¶Ҷжһғжө з§ҷha
    const getRes = await apiFetch(GH_API, { headers: ghHeaders() });
    if (!getRes.ok) throw new Error('HTTP ' + getRes.status);
    const file = await getRes.json();

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const putRes = await apiFetch(GH_API, {
      method: 'PUT',
      headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'йҸҮеӯҳжҹҠй—ӮоҶјеөҺйҸҒзүҲеөҒ', content: content, sha: file.sha })
    });
    if (!putRes.ok) throw new Error('HTTP ' + putRes.status);
    return true;
  } catch(e) {
    console.error('ж·ҮжҝҶз“Ёжҫ¶иҫ«и§Ұ:', e);
    return false;
  }
}

async function saveOneResponse(personNum, answers) {
  const data = await loadData();
  if (data._error) return false;
  data[personNum] = answers;
  return await saveAllData(data);
}

// ==================== жӨӨз”ёжҪ°зҖөиү°еҹ… ====================
function showPage(id) {
  document.querySelectorAll('#home-page, #quiz-page, #result-page').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

async function goHome() { showPage('home-page'); await renderHome(); }

// ==================== жЈЈж ӯгҖү ====================
async function renderHome() {
  const data = await loadData();
  if (data._error) {
    document.getElementById('person-grid').innerHTML = '<div style="text-align:center;padding:30px;color:#e53935">йҲҝзӢ…з¬Қ йҸғзҠізЎ¶жқ©зӮҙеёҙйҸҲе¶…е§ҹйҚЈоҹ’зҙқз’Үй”Ӣо—…йҸҢгғ§з¶үзјҒж»ғжӮ—йҚ’й”ӢжҹҠжӨӨз”ёжҪ°</div>';
    return;
  }
  const doneCount = Object.keys(data).length;
  const pct = Math.round((doneCount / TOTAL) * 100);

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('done-count').textContent = doneCount;

  let html = '';
  for (let i = 1; i <= TOTAL; i++) {
    const isDone = data[i] !== undefined;
    const cls = isDone ? 'done' : 'pending';
    const statusText = isDone ? 'е®ёжҸ’з•¬йҺҙ? : 'еҜ°е‘ӯпҪһйҚҗ?;
    html += `<div class="person-card ${cls}" onclick="startQuiz(${i})">
      <span class="num">${i}</span>
      <span class="status">${statusText}</span>
    </div>`;
  }
  document.getElementById('person-grid').innerHTML = html;
}

// ==================== й—ӮоҶјеөҺжӨӨ?====================
let currentPerson = null;
let currentAnswers = {};

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function startQuiz(personNum) {
  currentPerson = personNum;
  const data = await loadData();
  currentAnswers = data[personNum] ? { ...data[personNum] } : {};

  document.getElementById('quiz-badge').textContent = personNum;
  document.getElementById('quiz-name').textContent = `з»—?${personNum} жөЈе¶…жӮ“зҖӣоӣҶ;
  const hint = data[personNum] ? 'е®ёеҸүеҪҒжөңгӮҸзҙқйҚҷоҲҷж…ЁйҸҖ? : 'з’Үеі°жҙ–з»ӣж–ҫдә’ж¶“е¬®жЈ¶жЈ°?;
  document.getElementById('quiz-hint').textContent = hint;

  let html = '';
  QUESTIONS.forEach((q, idx) => {
    html += `<div class="question-block">
      <span class="q-num">${idx + 1}</span>
      <div class="q-title">${q.text}</div>
      <div class="options">`;
    q.opts.forEach((opt, optIdx) => {
      const score = optIdx + 1;
      const sel = currentAnswers[q.id] === score ? ' selected' : '';
      html += `<div class="option${sel}" onclick="selectOption(this, '${q.id}', ${score})">${opt}</div>`;
    });
    html += '</div>';
    // жЈ°жҝҶоҳ»зҗӣгғҘеҺ–зҖӣжҘҒоҶҢй”ӣеңЎBTIйҠҶдҪёеҸҙз“’пҪҮеҹҚжҝӮз•Ңз“‘й”ӣеұјз¬үиӨ°еҚһжҗ·йҚ–еҪ’еҺӨз» жҘҒзЎ¶й”ӣ?    if (q.extra) {
      q.extra.forEach(e => {
        const val = currentAnswers[e.id] || '';
        html += `<div class="extra-field"><label>${e.label}</label><input type="text" placeholder="${e.placeholder}" value="${escapeHtml(val)}" onchange="saveExtra('${e.id}', this.value)"></div>`;
      });
    }
    html += '</div>';
  });
  document.getElementById('questions-container').innerHTML = html;
  showPage('quiz-page');
}

function selectOption(el, qid, score) {
  el.parentElement.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  currentAnswers[qid] = score;
}

function saveExtra(id, value) {
  currentAnswers[id] = value;
}

async function submitQuiz() {
  // еҰ«вӮ¬йҸҢгғҘз№Җз»ӣж—Ҳо•ҪйҸ„оҲҡжғҒйҚҸг„©е„ҙйҚҘзӮөз“ҹй”ӣе ңзІҺж¶“е©ҡжЈ¶жЈ°жҰ dй”ӣеІғзғҰжқ©еҷҖxtraзҖӣжҘҒоҶҢй”ӣ?  const mainIds = QUESTIONS.map(q => q.id);
  if (mainIds.some(id => !currentAnswers[id])) {
    alert('з’Үеі°жҙ–з»ӣж—ҖеўҚйҸҲеӨҗжЈ¶жЈ°жЁәжӮ—йҚҗе¶ҶеҪҒжөңгӮҸзҙ’');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'йҺ»ж„Әж°Ұж¶“?..';

  const ok = await saveOneResponse(currentPerson, { ...currentAnswers });

  btn.disabled = false;
  btn.textContent = 'йҺ»ж„Әж°Ұй—ӮоҶјеөҺ';

  if (ok) {
    alert(`з»—?${currentPerson} жөЈе¶…жӮ“зҖӣп№ӮжЈ¶йҚ—еі°еҮЎйҺ»ж„Әж°Ұй”ӣд№Ј);
    goHome();
  } else {
    alert('йҺ»ж„Әж°Ұжҫ¶иҫ«и§Ұй”ӣеІғоҮ¬еҰ«вӮ¬йҸҢгғ§з¶үзјҒж»ғжӮ—й–Іе¶ҲзҳҜ');
  }
}

// ==================== зҖөе—ҷзҲңеҜ®еңӯзҚҘ ====================
let pwdCallback = null;

function showPwdModal(callback) {
  pwdCallback = callback;
  document.getElementById('pwd-modal').classList.remove('hidden');
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-err').classList.add('hidden');
  setTimeout(() => document.getElementById('pwd-input').focus(), 100);
}

function closePwdModal() {
  document.getElementById('pwd-modal').classList.add('hidden');
  pwdCallback = null;
}

function checkPwd() {
  const input = document.getElementById('pwd-input').value;
  if (input === ADMIN_PWD) {
    closePwdModal();
    if (pwdCallback) pwdCallback();
  } else {
    document.getElementById('pwd-err').classList.remove('hidden');
  }
}

// ==================== йҚ–еҪ’еҺӨз» жҘҒзЎ¶ ====================
function cosineSimilarity(a, b) {
  let dot = 0, magA = 0, magB = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    magA += a[i] * a[i];
    magB += b[i] * b[i];
  }
  if (magA === 0 || magB === 0) return 0;
  return dot / (Math.sqrt(magA) * Math.sqrt(magB));
}

function getFeatureVector(answers) {
  return QUESTIONS.map(q => answers[q.id]);
}

function computeMatching(data) {
  const persons = Object.keys(data).map(Number);
  if (persons.length < TOTAL) return null;

  // йҸӢеӢ«зј“йҗ—з‘°з·ӣйҚҡжҲҰеҷә
  const vectors = {};
  persons.forEach(p => { vectors[p] = getFeatureVector(data[p]); });

  // з’Ғпј„з•»ж¶“гӮ„иўұйҗ©й•җжҠҖжҗҙпёҫз…©й—ғ?  const simMatrix = {};
  for (let i = 0; i < persons.length; i++) {
    for (let j = i + 1; j < persons.length; j++) {
      const pi = persons[i], pj = persons[j];
      const key = pi < pj ? `${pi}-${pj}` : `${pj}-${pi}`;
      simMatrix[key] = cosineSimilarity(vectors[pi], vectors[pj]);
    }
  }

  function getSim(a, b) {
    if (a === b) return 1;
    const key = a < b ? `${a}-${b}` : `${b}-${a}`;
    return simMatrix[key] || 0;
  }

  // з’җоҒ„зёҫйҚ’е—ҷзІҚ
  let remaining = new Set(persons);
  let groups = [];

  for (let g = 0; g < 3; g++) {
    let bestPair = null, bestSim = -1;
    const arr = [...remaining];
    for (let i = 0; i < arr.length; i++) {
      for (let j = i + 1; j < arr.length; j++) {
        const sim = getSim(arr[i], arr[j]);
        if (sim > bestSim) { bestSim = sim; bestPair = [arr[i], arr[j]]; }
      }
    }
    let group = new Set(bestPair);
    remaining.delete(bestPair[0]);
    remaining.delete(bestPair[1]);

    // йҚ”зҠІеҸҶйҸҲвӮ¬йҚҸз…ҺоҶҗйҗЁеӢӘжұүйҗ©жқ‘еҹҢе©ҠвҖіжҶі
    while (group.size < GROUP_SIZE && remaining.size > 0) {
      let bestPerson = null, bestAvgSim = -Infinity;
      for (const p of remaining) {
        let totalSim = 0;
        for (const m of group) totalSim += getSim(p, m);
        const avgSim = totalSim / group.size;
        if (avgSim > bestAvgSim) { bestAvgSim = avgSim; bestPerson = p; }
      }
      group.add(bestPerson);
      remaining.delete(bestPerson);
    }
    groups.push([...group]);
  }

  // зҒһвӮ¬й–®г„ӨзҙӯйҚ–ж өзҙ°зҒҸжҝҠзҳҜжөңгӮҶеҙІ
  function groupScore(group) {
    let total = 0, pairs = 0;
    for (let i = 0; i < group.length; i++) {
      for (let j = i + 1; j < group.length; j++) {
        total += getSim(group[i], group[j]);
        pairs++;
      }
    }
    return pairs > 0 ? total / pairs : 0;
  }

  function totalScore(gs) {
    return gs.reduce((s, g) => s + groupScore(g), 0);
  }

  let improved = true;
  let iterations = 0;
  while (improved && iterations < 100) {
    improved = false;
    iterations++;
    for (let g1 = 0; g1 < 3; g1++) {
      for (let g2 = g1 + 1; g2 < 3; g2++) {
        for (let i = 0; i < groups[g1].length; i++) {
          for (let j = 0; j < groups[g2].length; j++) {
            const before = totalScore(groups);
            // жөңгӮҶеҙІ
            const tmp = groups[g1][i];
            groups[g1][i] = groups[g2][j];
            groups[g2][j] = tmp;
            const after = totalScore(groups);
            if (after > before) {
              improved = true;
            } else {
              // йҺ№гҲ жҙ–йҸү?              const tmp2 = groups[g1][i];
              groups[g1][i] = groups[g2][j];
              groups[g2][j] = tmp2;
            }
          }
        }
      }
    }
  }

  return groups.map((g, i) => ({
    id: ['A', 'B', 'C'][i],
    members: g.sort((a, b) => a - b),
    score: groupScore(g)
  }));
}

// ==================== зјҒж’ҙзҒүжӨӨ?====================
async function showResult() {
  const data = await loadData();
  const doneCount = Object.keys(data).length;
  if (doneCount < TOTAL) {
    alert(`иӨ°ж’іеў жө ?${doneCount} / ${TOTAL} жөңе“„з•¬йҺҙж„°жЈ¶йҚ—еҮӨзҙқй—ҮвӮ¬йҚҸг„©е„ҙзҖ№еұҫеһҡйҚҡеәўеў й‘іиҠҘз…ЎйҗӘе¬¬зІЁйҸӢжәҝвӮ¬дҝҷ);
    return;
  }

  showPwdModal(() => {
    const groups = computeMatching(data);
    if (!groups) { alert('йҸҒзүҲеөҒеҜ®еӮҡзҲ¶й”ӣеІғоҮ¬й–Іе¶Үз–ҶйҚҡеәЁеҷёз’Ү?); return; }

    const colors = { A: '#667eea', B: '#e91e63', C: '#4caf50' };

    let html = '<h2 style="color:#fff;margin-bottom:16px;font-size:22px">йҚ’е—ҷзІҚзјҒж’ҙзҒү</h2>';
    html += '<p style="color:rgba(255,255,255,0.8);margin-bottom:20px">жө гғӨз¬…йҸ„оҲӣзүҙйҺ№оҮҖжЈ¶йҚ—еі°е°®й–°е¶Үж®‘йҸҲвӮ¬жөјжЁәоҶ–й‘ёе¶…еһҺй–°е¶ҶжҹҹеҰ—?/p>';

    groups.forEach(g => {
      const scorePct = Math.round(g.score * 100);
      html += `<div class="result-card dorm-${g.id.toLowerCase()}">
        <h3>зҖ№иғҜеһ— ${g.id} <span style="font-size:14px;font-weight:400;color:#888">й”ӣе қе°®й–°е¶…е®і ${scorePct}%й”ӣ?/span></h3>
        <div class="score">йҚҸ?жөң?/div>
        <div class="member-list">`;
      g.members.forEach(m => {
        html += `<div class="member-tag">
          <span class="dot" style="background:${colors[g.id]}"></span>
          з»—?${m} жөЈе¶…жӮ“зҖӣ?        </div>`;
      });
      html += '</div></div>';
    });

    html += `<button class="btn btn-outline" onclick="goHome()">жқ©ж–ҝжҙ–жЈЈж ӯгҖү</button>`;
    document.getElementById('result-content').innerHTML = html;
    showPage('result-page');
  });
}
